<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Кира — моя вселенная 💜</title>
<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
font-family:Segoe UI, sans-serif;
background:linear-gradient(160deg,#0f051d,#1a0933,#2d1060);
color:white;
height:100%;
}

canvas{
position:absolute;
top:0;
left:0;
}

#ui{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

h1{
font-size:34px;
letter-spacing:2px;
opacity:0;
animation:fadeIn 3s forwards;
}

button{
margin-top:20px;
padding:12px 28px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#9333ea,#c084fc);
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 25px #a855f7;
}

#message{
margin-top:25px;
font-size:20px;
opacity:0;
transition:2s;
}

@keyframes fadeIn{
to{opacity:1;}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="ui">
<h1>Кира, ты — моя вселенная 💜</h1>
<button onclick="startExperience()">Запустить магию ✨</button>
<div id="message"></div>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2023/03/27/audio_5f9c4b9c6e.mp3?filename=ambient-piano-141148.mp3" type="audio/mpeg">
</audio>

<script>
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
let shootingStars=[];
let started=false;
let constellations=0;

for(let i=0;i<150;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.2
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();
});
}

function animate(){
drawStars();
requestAnimationFrame(animate);
}
animate();

canvas.addEventListener("mousemove",e=>{
stars.forEach(s=>{
let dx=e.clientX-s.x;
let dy=e.clientY-s.y;
let dist=Math.sqrt(dx*dx+dy*dy);
if(dist<120){
s.x-=dx*0.01;
s.y-=dy*0.01;
}
});
});

canvas.addEventListener("click",e=>{
if(!started)return;

ctx.strokeStyle="#c084fc";
ctx.lineWidth=1.5;
ctx.beginPath();
ctx.moveTo(e.clientX-20,e.clientY-20);
ctx.lineTo(e.clientX+20,e.clientY+20);
ctx.stroke();

constellations++;

if(constellations===3){
createHeart();
}
});

function createHeart(){
let t=0;
let interval=setInterval(()=>{
t+=0.05;
ctx.fillStyle="#d8b4fe";
let x=canvas.width/2+16*Math.pow(Math.sin(t),3)*10;
let y=canvas.height/2-
(13*Math.cos(t)-5*Math.cos(2*t)
-2*Math.cos(3*t)-Math.cos(4*t))*10;
ctx.fillRect(x,y,2,2);

if(t>=Math.PI*2){
clearInterval(interval);
showMessage();
}
},20);
}

function showMessage(){
let msg=document.getElementById("message");
msg.innerHTML="Во всей этой бесконечной вселенной<br>моё самое красивое созвездие — это ты, Кира 💜";
msg.style.opacity=1;
}

function startExperience(){
started=true;
document.getElementById("music").play();
document.querySelector("button").style.display="none";
}
</script>

</body>
</html>
