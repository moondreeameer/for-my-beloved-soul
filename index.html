<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Кира - моя вселенная 💜</title>
<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:radial-gradient(circle at center,#1a0933,#0d051a 70%);
font-family:Segoe UI, sans-serif;
color:white;
height:100%;
}

canvas{
position:absolute;
top:0;
left:0;
}

#center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
max-width:700px;
}

h1{
font-size:38px;
letter-spacing:2px;
margin-bottom:20px;
opacity:0;
animation:fade 3s forwards;
}

p{
font-size:18px;
opacity:0;
transition:2s;
}

button{
margin-top:25px;
padding:14px 32px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#9333ea,#c084fc);
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 30px #a855f7;
}

#final{
opacity:0;
font-size:22px;
margin-top:30px;
transition:3s;
}

@keyframes fade{
to{opacity:1;}
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="center">
<h1>Кира 💜</h1>
<p id="text1">Иногда я думаю о бесконечной вселенной...</p>
<p id="text2">о миллиардах звёзд...</p>
<p id="text3">и понимаю, что самая яркая из них - это ты.</p>
<button onclick="start()">Начать путешествие ✨</button>
<div id="final"></div>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2023/03/27/audio_5f9c4b9c6e.mp3?filename=ambient-piano-141148.mp3" type="audio/mpeg">
</audio>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
let shooting=[];
let started=false;
let phase=0;

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
alpha:Math.random()
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,"+s.alpha+")";
ctx.fill();
s.alpha+= (Math.random()-0.5)*0.02;
if(s.alpha<0) s.alpha=0;
if(s.alpha>1) s.alpha=1;
});

shooting.forEach((s,i)=>{
ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x-80,s.y+20);
ctx.strokeStyle="white";
ctx.stroke();
s.x+=10;
s.y-=3;
if(s.x>canvas.width){
shooting.splice(i,1);
}
});

requestAnimationFrame(draw);
}
draw();

function createShooting(){
shooting.push({
x:0,
y:Math.random()*canvas.height/2
});
}

setInterval(()=>{if(started)createShooting()},3000);

function start(){
if(started)return;
started=true;
document.getElementById("music").play();

document.querySelector("button").style.display="none";

setTimeout(()=>{
document.getElementById("text1").style.opacity=1;
},500);

setTimeout(()=>{
document.getElementById("text2").style.opacity=1;
},2500);

setTimeout(()=>{
document.getElementById("text3").style.opacity=1;
},4500);

setTimeout(()=>{
formName();
},7000);
}

function formName(){
let text="КИРА";
ctx.font="bold 80px Segoe UI";
ctx.fillStyle="#d8b4fe";
ctx.textAlign="center";
ctx.fillText(text,canvas.width/2,canvas.height/2);

setTimeout(()=>{
pulseHeart();
},3000);
}

function pulseHeart(){
let scale=1;
let grow=true;

let interval=setInterval(()=>{
ctx.clearRect(canvas.width/2-120,canvas.height/2-120,240,240);
ctx.font="bold "+(80*scale)+"px Segoe UI";
ctx.fillStyle="#c084fc";
ctx.textAlign="center";
ctx.fillText("💜",canvas.width/2,canvas.height/2+30);

if(grow){scale+=0.02;}else{scale-=0.02;}
if(scale>1.2)grow=false;
if(scale<1)grow=true;

},30);

document.getElementById("final").innerHTML=
"Во всей этой бесконечности<br>моё сердце выбрало тебя.<br><br>Я люблю тебя, Кира 💜";
document.getElementById("final").style.opacity=1;
}
</script>

</body>
</html>
